# KeyHop 配置
#
# ─── 格式 ───
#
# 识别码 = 路径/URL
#
# 识别码：搜索时输入的快捷关键字，不区分大小写
# 路径/URL：可以是网址、程序路径、文件路径、文件夹路径
#
# # 开头的行是注释（必须独占一行）
# 空行会被忽略
# = 号左右允许空格
#
# ─── 值类型说明 ───
#
# 以 http:// 或 https:// 开头 → 浏览器打开
# 以 .exe 结尾              → 启动该程序
# 已存在的文件夹路径        → 打开文件夹
# 已存在的文件路径          → 默认程序打开
# 不存在                    → 报错，不执行
#




# ─── 字体设置 ───
# _font = 字体名称（默认 Segoe UI）
# _font_size = 字号（默认 18）
_font = Microsoft YaHei
_font_size = 18


# ─── 界面设置 ───
#
# 窗口宽度（像素），默认 500
_width = 500
# 窗口圆角大小，默认 12
_round_corner = 20
# 窗口是否置顶，默认 true
_always_on_top = true
# 窗口透明度 0~255（255=不透明），默认 255
_opacity = 255
# 结果列表最多显示条数，默认 8
_max_results = 2
# 匹配是否区分大小写，默认 true
_case_sensitive = false
# 失去焦点时是否自动隐藏，默认 true
_hide_on_focus_loss = true
# 主题色 RGB（16进制），默认 1E1E1E
_theme_color = 1E1E1E
# 输入框背景色 RGB（16进制），默认 2A2A2A
_input_bg_color = 2A2A2A
# 选中项高亮色 RGB（16进制），默认 4A6FA5
_accent_color = 4A6FA5
# 文字颜色 RGB（16进制），默认 CCCCCC
_text_color = CCCCCC
# 状态文字字号（如"第3条/共10条"），默认 12
_status_font_size = 12
# 面板水平位置 0~100（0=屏幕左边缘 50=正中间 100=屏幕右边缘），默认 50
_panel_position_x = 50
# 面板垂直位置 0~100（0=屏幕顶边 50=正中间 100=屏幕底边），默认 50
_panel_position_y = 30


# ─── 分类 ───
#
# 用 [分类名] 分组，方便管理
# 分类名仅供阅读参考，不参与搜索逻辑
# 同一个分类下的条目建议放一起

[网址]
b23 = https://www.bilibili.com
bli = https://www.bilibili.com
blibili = https://www.bilibili.com
gh = https://github.com
google = https://www.google.com
xigua = https://www.ixigua.com
youtube = https://www.youtube.com
zhihu = https://www.zhihu.com

[程序]
calc = C:\Windows\System32\calc.exe
notepad = C:\Windows\System32\notepad.exe


[文件或文件夹]

[搜索引擎]
# 搜索框里输入识别码+空格激活对应的搜索引擎
bd = https://www.baidu.com/s?wd=
gg = https://www.google.com/search?q=

