# Gua 配置
#
# ─── 格式 ───
#
# 识别码 = 路径/URL
#
# 识别码：搜索时输入的快捷关键字，不区分大小写
# 路径/URL：可以是网址、程序路径、文件路径、文件夹路径
#
# # 开头的行是注释（必须独占一行）
# 空行会被忽略
# = 号左右允许空格
#
# ─── 值类型说明 ───
#
# 以 http:// 或 https:// 开头 → 浏览器打开
# 以 .exe 结尾              → 启动该程序
# 已存在的文件夹路径        → 打开文件夹
# 已存在的文件路径          → 默认程序打开
# 不存在                    → 报错，不执行
#




# ─── 字体设置 ───
# _font = 字体家族名称（不是文件名！查看方法见下方说明）
# _font_size = 字号（默认 18）
#
# 如何查看字体家族名称：
#   1. 打开 C:\Windows\Fonts 或 fonts/ 文件夹
#   2. 双击 .ttf / .otf 字体文件
#   3. 弹出窗口最顶部显示的名称就是家族名称
#   例如：文件 "SmileySans-Oblique.ttf" 的家族名称是 "得意黑"
#       文件 "LXGWWenKai-Regular.ttf" 的家族名称是 "LXGW WenKai"
#
# 如果你把字体文件放到 fonts/ 目录下，不配 _font 也能自动生效
# 多个字体时按文件名排序取第一个
_font = 得意黑
_font_size = 18


# ─── 界面设置 ───
#
# ── 热键格式 ──
#
#   修饰键 + 修饰键 + ... + 按键
#
#   规则：
#     - 至少两个键，第一个必须是修饰键
#     - 修饰键放在前面，按键放最后，用 + 连接
#     - 不区分大小写
#
#   修饰键（可选多个）：
#     Alt   Ctrl   Shift   Win
#
#   按键（最后一个，可选以下任意一个）：
#     字母：  A~Z
#     数字：  0~9
#     功能键：F1~F24
#     常用键：Space  Enter  Esc  Tab  Backspace
#             Delete  Insert  Home  End
#             PageUp  PageDown
#             Pause  CapsLock  ScrollLock
#     方向键：Up  Down  Left  Right
#     符号键：[  ]  \  ;  '  ,  .  /  -  =  `
#
#   示例：
#     Alt+Space      ← 默认
#     Ctrl+J
#     Ctrl+Shift+F
#     Alt+F1
#     Ctrl+[
#     Ctrl+Shift+Space
#
_hotkey = Ctrl+J


# 黑名单程序（逗号分隔的 exe 文件名，不区分大小写）
# 当前台窗口是黑名单中的程序时，热键不响应，防止游戏等场景误触
# 示例：_blacklist = notepad.exe,calc.exe
_blacklist =


#
# 窗口宽度（像素），默认 500
_width = 500
# 窗口圆角大小，默认 12
_round_corner = 12
# 窗口是否置顶，默认 true
_always_on_top = true
# 窗口透明度 0~255（255=不透明），默认 255
_opacity = 255
# 结果列表最多显示条数，默认 8
_max_results = 2
# 匹配是否区分大小写，默认 true
_case_sensitive = false
# 失去焦点时是否自动隐藏，默认 true
_hide_on_focus_loss = true
# 主题色 RGB（16进制），默认 1E1E1E
_theme_color = 1E1E1E
# 输入框背景色 RGB（16进制），默认 2A2A2A
_input_bg_color = 2A2A2A
# 选中项高亮色 RGB（16进制），默认 4A6FA5
_accent_color = 4A6FA5
# 文字颜色 RGB（16进制），默认 CCCCCC
_text_color = CCCCCC
# 状态文字字号（如"第3条/共10条"），默认 12
_status_font_size = 12
# 面板水平位置 0~100（0=屏幕左边缘 50=正中间 100=屏幕右边缘），默认 50
_panel_position_x = 50
# 面板垂直位置 0~100（0=屏幕顶边 50=正中间 100=屏幕底边），默认 50
_panel_position_y = 40


# ─── 分类 ───
#
# 用 [分类名] 分组，方便管理
# 分类名仅供阅读参考，不参与搜索逻辑
